{% extends 'base.html' %}
{% block title %}Change Password — SocialApp{% endblock %}
{% block content %}
<div class="container-narrow py-4">
  <div class="glass-card p-4">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="/settings/" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
      <h5 class="mb-0">Change Password</h5>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group mb-3">
        <label>Current Password</label>
        {{ form.current_password }}
      </div>
      <div class="form-group mb-3">
        <label>New Password</label>
        {{ form.new_password }}
      </div>
      <div class="form-group mb-4">
        <label>Confirm New Password</label>
        {{ form.confirm_password }}
      </div>
      {% if form.errors %}
      <div class="alert-error mb-3">{{ form.non_field_errors.0 }}</div>
      {% endif %}
      <button type="submit" class="btn btn-gradient w-100">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
