{% extends 'base.html' %}
{% block title %}Edit Profile — SocialApp{% endblock %}
{% block content %}
<div class="container-narrow py-4">
  <div class="glass-card p-4">
    <h5 class="mb-4"><i class="fas fa-user-edit me-2 text-gradient"></i>Edit Profile</h5>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control glass-input" value="{{ form.first_name.value|default:'' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control glass-input" value="{{ form.last_name.value|default:'' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control glass-input" value="{{ form.email.value|default:'' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Bio</label>
          {{ form.bio }}
        </div>
        <div class="col-12">
          <label class="form-label">Website</label>
          {{ form.website }}
        </div>
        <div class="col-12">
          <label class="form-label">Location</label>
          {{ form.location }}
        </div>
        <div class="col-12">
          <label class="form-label">Profile Picture</label>
          {{ form.avatar }}
        </div>
        <div class="col-12">
          <label class="form-label">Cover Photo</label>
          {{ form.cover_photo }}
        </div>
        <div class="col-12">
          <div class="form-check">
            {{ form.is_private }}
            <label class="form-check-label">Private Account</label>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <a href="/profile/{{ request.user.username }}/" class="btn btn-glass">Cancel</a>
        <button type="submit" class="btn btn-gradient px-4">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
